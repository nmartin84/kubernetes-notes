<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GitLab CI/CD Python pipeline basics" width="100%" height="auto">
  <rect x="0" y="0" width="960" height="620" rx="24" fill="#ffffff"/>

  <rect x="24" y="24" width="912" height="572" rx="22" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>

  <text x="480" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#0f172a">
    GitLab CI/CD Python Pipeline Basics
  </text>
  <text x="480" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#475569">
    A push triggers automated Python jobs for install, lint, test, package, and deploy
  </text>

  <defs>
    <marker id="py_gl_arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Top flow -->
  <rect x="70" y="125" width="170" height="88" rx="16" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
  <text x="155" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#9a3412">
    Git push / MR
  </text>
  <text x="155" y="179" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7c2d12">
    <tspan x="155" dy="0">Code change starts</tspan>
    <tspan x="155" dy="18">the pipeline</tspan>
  </text>

  <rect x="305" y="125" width="190" height="88" rx="16" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="400" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#3730a3">
    .gitlab-ci.yml
  </text>
  <text x="400" y="179" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4338ca">
    <tspan x="400" dy="0">Defines stages, jobs,</tspan>
    <tspan x="400" dy="18">rules, and variables</tspan>
  </text>

  <rect x="560" y="125" width="145" height="88" rx="16" fill="#ecfeff" stroke="#a5f3fc" stroke-width="2"/>
  <text x="632" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#155e75">
    Python image
  </text>
  <text x="632" y="179" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#164e63">
    <tspan x="632" dy="0">Example:</tspan>
    <tspan x="632" dy="18">python:3.12</tspan>
  </text>

  <rect x="765" y="125" width="125" height="88" rx="16" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="2"/>
  <text x="827" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#5b21b6">
    Runner
  </text>
  <text x="827" y="179" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4c1d95">
    <tspan x="827" dy="0">Executes</tspan>
    <tspan x="827" dy="18">each job</tspan>
  </text>

  <path d="M245 169 C265 169, 282 169, 302 169" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#py_gl_arrow)"/>
  <path d="M500 169 C520 169, 537 169, 557 169" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#py_gl_arrow)"/>
  <path d="M710 169 C730 169, 742 169, 762 169" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#py_gl_arrow)"/>

  <!-- Main pipeline container -->
  <rect x="60" y="255" width="840" height="235" rx="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="480" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#0f172a">
    Common Python CI/CD stages
  </text>

  <!-- Stage setup -->
  <rect x="92" y="325" width="140" height="105" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="162" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#334155">
    Install
  </text>
  <text x="162" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#475569">
    <tspan x="162" dy="0">pip install</tspan>
    <tspan x="162" dy="17">requirements.txt</tspan>
    <tspan x="162" dy="17">or pyproject.toml</tspan>
  </text>

  <!-- Stage lint -->
  <rect x="258" y="325" width="120" height="105" rx="16" fill="#fef9c3" stroke="#fde68a" stroke-width="2"/>
  <text x="318" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#854d0e">
    Lint
  </text>
  <text x="318" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#713f12">
    <tspan x="318" dy="0">ruff</tspan>
    <tspan x="318" dy="17">flake8</tspan>
    <tspan x="318" dy="17">black --check</tspan>
  </text>

  <!-- Stage test -->
  <rect x="405" y="325" width="135" height="105" rx="16" fill="#ecfeff" stroke="#a5f3fc" stroke-width="2"/>
  <text x="472" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#155e75">
    Test
  </text>
  <text x="472" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#164e63">
    <tspan x="472" dy="0">pytest</tspan>
    <tspan x="472" dy="17">coverage</tspan>
    <tspan x="472" dy="17">JUnit report</tspan>
  </text>

  <!-- Stage package -->
  <rect x="567" y="325" width="135" height="105" rx="16" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
  <text x="634" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#166534">
    Package
  </text>
  <text x="634" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#14532d">
    <tspan x="634" dy="0">python -m build</tspan>
    <tspan x="634" dy="17">wheel</tspan>
    <tspan x="634" dy="17">sdist</tspan>
  </text>

  <!-- Stage deploy -->
  <rect x="730" y="325" width="125" height="105" rx="16" fill="#fef2f2" stroke="#fecaca" stroke-width="2"/>
  <text x="792" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#991b1b">
    Deploy
  </text>
  <text x="792" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#7f1d1d">
    <tspan x="792" dy="0">publish</tspan>
    <tspan x="792" dy="17">PyPI / registry</tspan>
    <tspan x="792" dy="17">only on tags</tspan>
  </text>

  <!-- Pipeline arrows -->
  <path d="M235 377 C242 377, 248 377, 255 377" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#py_gl_arrow)"/>
  <path d="M382 377 C389 377, 396 377, 402 377" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#py_gl_arrow)"/>
  <path d="M545 377 C552 377, 559 377, 564 377" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#py_gl_arrow)"/>
  <path d="M707 377 C714 377, 721 377, 727 377" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#py_gl_arrow)"/>

  <text x="480" y="463" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">
    Each box is a job or stage; failed lint or tests usually stop package and deploy from running.
  </text>

  <!-- Support concepts bottom -->
  <rect x="85" y="520" width="190" height="48" rx="14" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.5"/>
  <text x="180" y="541" text-anchor="middle" font-family="Arial, sans-serif" font-size="13.5" font-weight="700" fill="#075985">
    cache
  </text>
  <text x="180" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#075985">
    reuse pip downloads
  </text>

  <rect x="310" y="520" width="205" height="48" rx="14" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="412" y="541" text-anchor="middle" font-family="Arial, sans-serif" font-size="13.5" font-weight="700" fill="#5b21b6">
    artifacts
  </text>
  <text x="412" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#5b21b6">
    save reports and wheels
  </text>

  <rect x="550" y="520" width="160" height="48" rx="14" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="630" y="541" text-anchor="middle" font-family="Arial, sans-serif" font-size="13.5" font-weight="700" fill="#166534">
    variables
  </text>
  <text x="630" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#166534">
    tokens and settings
  </text>

  <rect x="745" y="520" width="125" height="48" rx="14" fill="#ffedd5" stroke="#fdba74" stroke-width="1.5"/>
  <text x="807" y="541" text-anchor="middle" font-family="Arial, sans-serif" font-size="13.5" font-weight="700" fill="#9a3412">
    rules
  </text>
  <text x="807" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#9a3412">
    branch / tag logic
  </text>
</svg>